<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>histoire — Mahomet : entre histoire et religion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  /* type — Reem Kufi (geometric / Islamic-flavor headlines), Amiri (display italic), Manrope (body) */
  --font-display: "Reem Kufi", "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
  --font-italic: "Amiri", "Cormorant Garamond", Georgia, serif;
  --font-body: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* light palette — warm sand + jade tilework + saffron + terracotta */
  --bg: #F2E8D2;
  --bg-2: #ECDFC1;
  --surface: #FBF5E4;
  --surface-2: #F0E5C8;
  --ink: #1A140C;
  --ink-soft: #392E1F;
  --ink-muted: #7C6A4D;
  --primary: #094844;
  --primary-soft: #156460;
  --deep: #0F2D2C;
  --accent: #BC7A1F;
  --accent-soft: #D9A04A;
  --terra: #A03A2C;
  --rule: #D9C9A2;
  --rule-soft: #E4D6B0;
  --danger: #9C3B2C;

  /* tone tags */
  --tag-naissance-bg: #DCEAE3;
  --tag-naissance-fg: #275A4A;
  --tag-religion-bg: #E9DEC4;
  --tag-religion-fg: #6B4E1A;
  --tag-opposition-bg: #F0DAD0;
  --tag-opposition-fg: #7A3A28;
  --tag-tournant-bg: #DFE3D6;
  --tag-tournant-fg: #4D5B30;
  --tag-bataille-bg: #ECD9D2;
  --tag-bataille-fg: #7C3527;
  --tag-fin-bg: #DDD6CB;
  --tag-fin-fg: #44392C;
  --tag-default-bg: #E8DECB;
  --tag-default-fg: #4F4537;
  --tag-vie-privée-bg: #E2DAEA;
  --tag-vie-privée-fg: #4C3F66;

  /* shape */
  --r-sm: 8px;
  --r: 14px;
  --r-lg: 22px;
  --shadow-1: 0 1px 0 rgba(31,26,20,.04), 0 1px 2px rgba(31,26,20,.04);
  --shadow-2: 0 4px 18px -8px rgba(31,26,20,.18), 0 1px 2px rgba(31,26,20,.05);
}
html[data-theme="dark"] {
  --bg: #0E1816;
  --bg-2: #14211F;
  --surface: #182926;
  --surface-2: #1F332F;
  --ink: #F4E8CD;
  --ink-soft: #E0D2B0;
  --ink-muted: #9B8E72;
  --primary: #5DBFB4;
  --primary-soft: #82D2C8;
  --deep: #0A1413;
  --accent: #DCA856;
  --accent-soft: #ECC178;
  --terra: #D2715E;
  --rule: #2A3A36;
  --rule-soft: #364844;

  --tag-naissance-bg: #1F3A33; --tag-naissance-fg: #9DD6C3;
  --tag-religion-bg: #3A2E1B; --tag-religion-fg: #E2C781;
  --tag-opposition-bg: #3A2620; --tag-opposition-fg: #E2A28E;
  --tag-tournant-bg: #2C3422; --tag-tournant-fg: #BFD09A;
  --tag-bataille-bg: #3D2620; --tag-bataille-fg: #E5A294;
  --tag-fin-bg: #2A241D; --tag-fin-fg: #C2B49E;
  --tag-default-bg: #2C2519; --tag-default-fg: #C7B58F;
  --tag-vie-privée-bg: #2A2440; --tag-vie-privée-fg: #B7A8DA;

  --shadow-1: 0 1px 0 rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-2: 0 8px 24px -10px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.3);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15.5px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
@media (max-width: 480px) {
  body { font-size: 14.5px; line-height: 1.55; }
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, button { font: inherit; }
a { color: var(--primary); text-decoration: none; }
em { font-family: var(--font-display); font-style: italic; }

h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.005em; color: var(--ink); margin: 0; line-height: 1.18; text-wrap: balance; }
h1 { font-size: clamp(1.9rem, 6.5vw, 3.4rem); font-weight: 500; letter-spacing: -0.01em; }
h2 { font-size: clamp(1.4rem, 4.5vw, 2.2rem); font-weight: 500; }
h3 { font-size: clamp(1.1rem, 3.5vw, 1.3rem); font-weight: 500; }
h4 { font-size: 1.05rem; font-weight: 600; }
p { margin: 0 0 1em; text-wrap: pretty; color: var(--ink-soft); }
em { font-family: var(--font-italic); font-style: italic; font-weight: 400; }

.kicker {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.55rem;
}

/* — App shell ————————————————————————————— */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
  background: var(--bg);
}
@media (max-width: 960px) {
  .app { grid-template-columns: 1fr; }
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--rule);
  padding: 22px 18px 18px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
@media (max-width: 960px) {
  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: min(86vw, 320px);
    z-index: 50;
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.2,0,.2,1);
    box-shadow: var(--shadow-2);
    padding-bottom: 24px;
  }
  .sidebar.is-open { transform: translateX(0); }
}

.brand {
  display: flex; gap: 12px; align-items: center;
  padding: 6px 8px 14px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
}
.brand-mark {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  background: var(--primary);
  color: var(--accent-soft);
  border-radius: 10px;
  position: relative;
  box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--accent) 40%, transparent);
}
.brand-mark::before {
  content: "";
  position: absolute;
  inset: 4px;
  border-radius: 7px;
  border: 1px dashed color-mix(in oklab, var(--accent) 60%, transparent);
  pointer-events: none;
}
.brand-name { font-family: var(--font-display); font-size: 1.45rem; font-weight: 600; line-height: 1; color: var(--ink); letter-spacing: -0.01em; }
.brand-sub { font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); margin-top: 4px; }

.nav-group { display: flex; flex-direction: column; gap: 6px; }
.nav-group-title {
  font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-muted);
  padding: 4px 10px;
}
.nav-group ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  color: var(--ink-soft);
  font-size: 0.92rem;
  text-align: left;
  transition: background .15s, color .15s;
}
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.is-active {
  background: var(--primary);
  color: var(--bg);
}

.sidebar-foot { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--rule); }
.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 8px;
  font-size: 0.7rem;
  border: 1px dashed var(--rule);
  border-radius: 999px;
  color: var(--ink-muted);
  background: var(--surface);
  opacity: 0.6;
}
.badge.is-earned {
  border-style: solid;
  border-color: var(--accent);
  background: var(--tag-religion-bg);
  color: var(--tag-religion-fg);
  opacity: 1;
}

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 40;
  backdrop-filter: blur(2px);
}

/* main */
.main { display: flex; flex-direction: column; min-width: 0; }
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; gap: 10px;
  padding: 14px 28px;
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid var(--rule);
}
@media (max-width: 960px) { .topbar { padding: 10px 14px; gap: 8px; } }
.topbar-menu { display: none; }
@media (max-width: 960px) { .topbar-menu { display: inline-grid; } }

.icon-btn {
  display: inline-grid; place-items: center;
  width: 40px; height: 40px;
  border-radius: var(--r-sm);
  color: var(--ink-soft);
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface-2); color: var(--ink); }

.search { flex: 1; min-width: 0; }
.search-trigger {
  display: flex; align-items: center; gap: 10px;
  width: 100%; max-width: 480px; min-height: 38px;
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 999px;
  color: var(--ink-muted);
  text-align: left;
  font-size: 0.88rem;
  transition: border-color .15s, background .15s;
}
.search-trigger:hover { border-color: var(--accent); }
.search-trigger > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
.search-trigger kbd {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 0.7rem;
  padding: 2px 6px; border: 1px solid var(--rule); border-radius: 4px;
  background: var(--bg);
  flex-shrink: 0;
}
@media (max-width: 720px) {
  .search-trigger > span { display: none; }
  .search-trigger kbd { display: none; }
  .search-trigger { width: auto; padding: 8px 12px; }
}

.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-progress { width: 160px; }
@media (max-width: 720px) { .topbar-progress { display: none; } }

.content { padding: 32px 56px 64px; max-width: 1180px; width: 100%; align-self: center; }
@media (max-width: 960px) { .content { padding: 22px 16px 64px; } }
@media (max-width: 480px) { .content { padding: 16px 14px 56px; } }

.foot {
  border-top: 1px solid var(--rule);
  padding: 18px 28px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
}

/* — Cards / atoms ————————————————————————— */
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 20px;
  box-shadow: var(--shadow-1);
}
button.card { text-align: left; cursor: pointer; transition: transform .18s ease, border-color .18s, box-shadow .18s; }
button.card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow-2); }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 20px;
  min-height: 44px;
  border-radius: 999px;
  font-weight: 600; font-size: 0.92rem;
  letter-spacing: 0.01em;
  transition: transform .12s, background .15s, color .15s, border-color .15s, box-shadow .15s;
}
.btn-primary { background: var(--primary); color: var(--bg); }
.btn-primary:hover { background: var(--primary-soft); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.tag {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: lowercase;
  background: var(--tag-default-bg);
  color: var(--tag-default-fg);
}
.tag-naissance { background: var(--tag-naissance-bg); color: var(--tag-naissance-fg); }
.tag-religion { background: var(--tag-religion-bg); color: var(--tag-religion-fg); }
.tag-opposition { background: var(--tag-opposition-bg); color: var(--tag-opposition-fg); }
.tag-tournant { background: var(--tag-tournant-bg); color: var(--tag-tournant-fg); }
.tag-bataille { background: var(--tag-bataille-bg); color: var(--tag-bataille-fg); }
.tag-fin { background: var(--tag-fin-bg); color: var(--tag-fin-fg); }
.tag-vie-privée { background: var(--tag-vie-privée-bg); color: var(--tag-vie-privée-fg); }

.fav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--rule);
  font-size: 0.78rem;
  color: var(--ink-muted);
  background: var(--surface);
  transition: color .15s, border-color .15s, background .15s;
}
.fav-btn:hover { border-color: var(--accent); color: var(--accent); }
.fav-btn.is-active { color: var(--accent); border-color: var(--accent); background: var(--tag-religion-bg); }

/* progress */
.progress { display: flex; flex-direction: column; gap: 6px; }
.progress-label {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 0.7rem;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.progress-track { height: 4px; background: var(--rule); border-radius: 999px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transition: width .4s cubic-bezier(.4,.0,.2,1);
}

/* image placeholder */
.img-placeholder {
  position: relative;
  background: var(--surface-2);
  border: 1px dashed var(--rule);
  border-radius: var(--r);
  color: var(--ink-muted);
  overflow: hidden;
}
.img-placeholder-bg { position: absolute; inset: 0; width: 100%; height: 100%; }
.img-placeholder-content {
  position: relative;
  height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  padding: 24px;
}
.img-placeholder-mono { font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.04em; }
.img-placeholder-note { font-size: 0.85rem; color: var(--ink-soft); text-align: center; }

/* — HOME ——————————————————————————— */
.page { animation: fadeUp .32s cubic-bezier(.2,.0,.2,1); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.hero {
  position: relative;
  border-radius: var(--r-lg);
  background:
    radial-gradient(ellipse at top right, color-mix(in oklab, var(--accent) 12%, transparent) 0%, transparent 60%),
    linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
  border: 1px solid var(--rule);
  padding: 64px 56px;
  overflow: hidden;
  margin-bottom: 36px;
  box-shadow: var(--shadow-1);
}
.hero::before {
  content: "";
  position: absolute;
  top: -2px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 22px;
  background:
    radial-gradient(circle at 50% 100%, var(--accent) 0 4px, transparent 4.5px),
    linear-gradient(90deg, transparent 0 calc(50% - 60px),
      var(--accent) calc(50% - 60px) calc(50% - 58px),
      transparent calc(50% - 58px) calc(50% + 58px),
      var(--accent) calc(50% + 58px) calc(50% + 60px),
      transparent calc(50% + 60px));
  opacity: 0.55;
  pointer-events: none;
}
.hero::after {
  content: "";
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 14px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 14' preserveAspectRatio='none'><path d='M0 14 L0 8 Q5 0 10 8 Q15 14 20 8 Q25 0 30 8 Q35 14 40 8 L40 14 Z' fill='%23BC7A1F' fill-opacity='0.4'/></svg>");
  background-size: 40px 14px;
  background-repeat: repeat-x;
  pointer-events: none;
}
@media (max-width: 720px) { .hero { padding: 36px 22px; margin-bottom: 28px; border-radius: var(--r); } }
@media (max-width: 480px) { .hero { padding: 28px 18px; } }
.hero-bg { position: absolute; inset: 0; color: var(--primary); }
.hero-content { position: relative; max-width: 720px; }
.hero-mono { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: inline-flex; align-items: center; gap: 10px; padding: 6px 14px; border: 1px solid color-mix(in oklab, var(--accent) 50%, transparent); border-radius: 999px; background: color-mix(in oklab, var(--accent) 8%, transparent); }
.hero h1 { font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 16px; }
.hero h1 em { color: var(--primary); font-style: italic; }
.hero p { color: var(--ink-soft); font-size: 1.08rem; max-width: 560px; }
@media (max-width: 480px) { .hero p { font-size: 0.98rem; } }
.hero-cta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 28px; }
.hero-cta .btn { flex: 1 1 auto; justify-content: center; }
@media (min-width: 481px) { .hero-cta .btn { flex: 0 0 auto; } }
.hero-strip { margin-top: 36px; color: var(--accent); display: flex; justify-content: flex-start; overflow: hidden; }

.home-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 40px;
}
@media (max-width: 720px) { .home-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 32px; } }
.stat {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 18px;
}
@media (max-width: 480px) { .stat { padding: 14px; } }
.stat-num {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 6vw, 2.4rem);
  line-height: 1; color: var(--primary);
  font-weight: 600;
}
.stat-label { font-size: 0.82rem; color: var(--ink-muted); margin-top: 6px; line-height: 1.35; }

.home-progress { margin-bottom: 48px; }
.card-progress { padding: 24px; }
.card-progress-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.card-progress-meta { display: flex; gap: 16px; font-size: 0.85rem; color: var(--ink-muted); }
.card-progress-meta span { display: inline-flex; align-items: center; gap: 5px; }

.chapters-grid { margin-bottom: 56px; }
.chapters-grid h2 { margin-bottom: 22px; }
.chapters-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (max-width: 720px) { .chapters-list { grid-template-columns: 1fr; } }
.chapter-card { display: flex; gap: 18px; padding: 22px; }
@media (max-width: 480px) { .chapter-card { gap: 14px; padding: 18px; } }
.chapter-card-num {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--accent);
  flex-shrink: 0;
  width: 60px;
}
@media (max-width: 480px) { .chapter-card-num { font-size: 1.6rem; width: 44px; } }
.chapter-card-body { flex: 1; }
.chapter-card-body h3 { margin: 4px 0 8px; }
.chapter-card-body p { font-size: 0.92rem; color: var(--ink-soft); margin-bottom: 14px; }
.chapter-card-foot {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.78rem; color: var(--ink-muted);
  font-family: var(--font-mono); letter-spacing: 0.04em;
}
.chapter-card-foot span { display: inline-flex; align-items: center; gap: 5px; }
.chapter-card-arrow { color: var(--accent); transition: transform .2s; }
button.chapter-card:hover .chapter-card-arrow { transform: translateX(4px); }

.home-tools h2 { margin-bottom: 22px; }
.tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 48px; }
@media (max-width: 720px) { .tools-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 36px; } }
.tool-card { display: flex; flex-direction: column; gap: 8px; padding: 22px; color: var(--ink); }
@media (max-width: 480px) { .tool-card { padding: 16px; } }
.tool-card svg { color: var(--primary); }
.tool-card h3 { margin: 4px 0 0; font-size: 1.15rem; }
.tool-card p { font-size: 0.85rem; color: var(--ink-muted); margin: 0; }

.card-question {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
  border-color: var(--accent);
}
.card-question svg { color: var(--accent); flex-shrink: 0; margin-top: 4px; }
.card-question p { font-family: var(--font-italic); font-size: 1.4rem; line-height: 1.4; color: var(--ink); margin: 8px 0 0; font-style: italic; font-weight: 400; }

/* — Chapter header ————————————————————————— */
.chapter-header {
  position: relative;
  border-radius: var(--r-lg);
  background: var(--surface);
  border: 1px solid var(--rule);
  padding: 56px 48px 48px;
  margin-bottom: 36px;
  overflow: hidden;
  box-shadow: var(--shadow-1);
}
.chapter-header::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 50%, var(--primary) 100%);
  opacity: 0.85;
}
.chapter-header::after {
  content: "";
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 80px; height: 18px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 18'><path d='M40 2 Q44 8 50 8 Q44 10 40 16 Q36 10 30 8 Q36 8 40 2 Z' fill='%23BC7A1F' fill-opacity='0.55'/><circle cx='40' cy='9' r='1.2' fill='%23BC7A1F'/></svg>");
  background-repeat: no-repeat;
  background-size: contain;
  pointer-events: none;
}
@media (max-width: 720px) { .chapter-header { padding: 36px 22px 28px; margin-bottom: 24px; border-radius: var(--r); } }
@media (max-width: 480px) { .chapter-header { padding: 28px 18px 22px; } }
.chapter-header-bg { position: absolute; inset: 0; color: var(--primary); }
.chapter-header-inner { position: relative; max-width: 760px; }
.chapter-num {
  font-family: var(--font-mono); font-size: 0.72rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 18px;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 5px 12px;
  border: 1px solid color-mix(in oklab, var(--accent) 45%, transparent);
  border-radius: 999px;
  background: color-mix(in oklab, var(--accent) 7%, transparent);
}
.chapter-kicker {
  font-family: var(--font-italic);
  font-size: 1.15rem;
  font-style: italic;
  font-weight: 400;
  color: var(--ink-muted);
  margin: 16px 0 8px;
}
.chapter-sub {
  font-size: 1.05rem;
  color: var(--ink-soft);
  max-width: 620px;
  margin: 14px 0 0;
}
.chapter-header-strip { margin-top: 28px; color: var(--accent); display: flex; }
.chapter-header-actions { position: absolute; top: 24px; right: 24px; }
@media (max-width: 720px) {
  .chapter-header-actions { position: static; margin-top: 18px; }
}

/* — prose page ————————————————————————— */
.page-prose .prose { max-width: 760px; margin: 0 auto; }
.page-prose .prose h2 { margin: 36px 0 14px; }
.page-prose .prose .lead { font-family: var(--font-italic); font-size: 1.4rem; line-height: 1.5; color: var(--ink); font-weight: 400; font-style: italic; margin-bottom: 24px; }
.page-prose .prose .caption { font-family: var(--font-mono); font-size: 0.74rem; color: var(--ink-muted); text-align: center; margin-top: 8px; letter-spacing: 0.04em; }

.quote {
  position: relative;
  background: var(--bg-2);
  border-left: 3px solid var(--accent);
  padding: 28px 28px 28px 60px;
  margin: 28px 0;
}
@media (max-width: 480px) { .quote { padding: 22px 18px 22px 46px; } .quote-mark { font-size: 3.2rem !important; left: 12px !important; } .quote blockquote { font-size: 1.1rem !important; } }
.quote-mark { position: absolute; left: 18px; top: 6px; font-family: var(--font-display); font-size: 4.5rem; line-height: 1; color: var(--accent); opacity: 0.7; }
.quote blockquote { margin: 0; font-family: var(--font-italic); font-size: 1.3rem; line-height: 1.5; font-style: italic; color: var(--ink); font-weight: 400; }

.objectives { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 24px 0; }
@media (max-width: 720px) { .objectives { grid-template-columns: 1fr; } }
.objectives .card { display: flex; gap: 14px; align-items: flex-start; }
.obj-num { font-family: var(--font-display); font-size: 1.8rem; color: var(--accent); line-height: 1; }
.objectives h4 { margin-bottom: 4px; }
.objectives p { font-size: 0.88rem; margin: 0; }

.callout {
  background: var(--bg-2);
  border-radius: var(--r);
  border: 1px solid var(--rule);
  padding: 22px;
  margin: 28px 0;
}
.callout-historian {
  background: linear-gradient(135deg, var(--bg-2), var(--surface-2));
  border-color: var(--accent);
}
.callout-head {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 0.78rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.callout p { margin: 0; }

.people-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 24px 0; }
@media (max-width: 720px) { .people-grid { grid-template-columns: 1fr; } }
.person-name { font-family: var(--font-display); font-size: 1.3rem; color: var(--ink); }
.person-role { font-size: 0.85rem; color: var(--ink-muted); margin-top: 4px; }

/* — Stylized map ————————————————————————— */
.stylized-map {
  position: relative;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 24px;
  margin: 28px 0 8px;
  overflow: hidden;
  color: var(--ink-muted);
}
.stylized-map-bg { position: absolute; inset: 0; color: var(--primary); }
.stylized-map-svg { position: relative; width: 100%; height: auto; display: block; }
.stylized-map text { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.04em; }
.map-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; fill: var(--ink-muted); text-transform: uppercase; }
.map-label { font-family: var(--font-display); font-size: 13px; fill: var(--ink); font-style: italic; }
.map-sub { font-size: 8.5px; fill: var(--ink-muted); letter-spacing: 0.04em; }

/* — Events page ————————————————————————— */
.events-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 24px;
  margin-bottom: 28px;
}
@media (max-width: 720px) { .events-layout { grid-template-columns: 1fr; } }
.events-track { display: flex; flex-direction: column; gap: 4px; }
.event-pill {
  display: flex; flex-direction: column; gap: 2px;
  padding: 10px 14px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  text-align: left;
  transition: background .15s, border-color .15s;
}
.event-pill:hover { background: var(--surface-2); }
.event-pill.is-active { background: var(--surface); border-color: var(--accent); }
.event-pill-year { font-family: var(--font-display); font-size: 1.4rem; color: var(--primary); line-height: 1; }
.event-pill-title { font-size: 0.85rem; color: var(--ink-soft); }
.event-pill.is-active .event-pill-title { color: var(--ink); }

.events-detail { padding: 28px; min-height: 280px; }
@media (max-width: 480px) { .events-detail { padding: 22px; min-height: 0; } }
.events-detail-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 18px; margin-bottom: 18px; flex-wrap: wrap;
}
.events-detail-head h2 { margin: 8px 0 4px; }
.events-detail-place { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-muted); display: inline-flex; align-items: center; gap: 5px; }
.events-detail-year { font-family: var(--font-display); font-size: 3rem; color: var(--accent); line-height: 1; }
@media (max-width: 480px) { .events-detail-year { font-size: 2.2rem; } }
@media (max-width: 720px) {
  .events-track { flex-direction: row; overflow-x: auto; gap: 8px; padding-bottom: 6px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .events-track::-webkit-scrollbar { display: none; }
  .event-pill { flex: 0 0 auto; scroll-snap-align: start; min-width: 110px; }
}

/* — Diffusion ————————————————————————— */
.diffusion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 0 0 32px; }
@media (max-width: 720px) { .diffusion-grid { grid-template-columns: 1fr; gap: 12px; } }
.diffusion-card { padding: 28px; }
@media (max-width: 480px) { .diffusion-card { padding: 22px; } }
.diffusion-num { font-family: var(--font-display); font-size: 1.6rem; color: var(--accent); margin-bottom: 8px; }
.diffusion-card h3 { margin-bottom: 10px; }

/* — Facts table ————————————————————————— */
.facts-table { display: flex; flex-direction: column; gap: 10px; max-width: 1000px; margin: 0 auto; }
.facts-head {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  gap: 16px;
  align-items: center;
  margin-bottom: 4px;
  position: sticky; top: 70px; z-index: 5;
}
.facts-col {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  font-family: var(--font-mono); font-size: 0.78rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  border-radius: var(--r-sm);
}
.facts-col-h { background: var(--tag-tournant-bg); color: var(--tag-tournant-fg); }
.facts-col-b { background: var(--tag-religion-bg); color: var(--tag-religion-fg); }
.facts-row {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  gap: 16px;
  align-items: stretch;
}
@media (max-width: 720px) {
  .facts-head { grid-template-columns: 1fr; }
  .facts-row { grid-template-columns: 1fr; }
  .facts-vs { display: none !important; }
}
.facts-cell h4 { font-size: 1.05rem; margin-bottom: 6px; }
.facts-cell p { font-size: 0.92rem; margin: 0; }
.facts-cell-h { border-left: 3px solid var(--primary); }
.facts-cell-b { border-left: 3px solid var(--accent); }
.facts-vs {
  display: grid; place-items: center;
  font-family: var(--font-italic); font-style: italic; font-weight: 400;
  font-size: 1.4rem; color: var(--ink-muted);
}

/* — Open questions / biblio ————————————————————————— */
.open-questions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 32px; }
@media (max-width: 720px) { .open-questions { grid-template-columns: 1fr; } }
.open-questions p { font-style: italic; font-family: var(--font-italic); font-weight: 400; font-size: 1.15rem; color: var(--ink); margin: 0; }
.biblio { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin: 18px 0; }
@media (max-width: 720px) { .biblio { grid-template-columns: 1fr; } }
.biblio ul { padding-left: 18px; margin: 0; color: var(--ink-soft); }
.biblio li { font-size: 0.9rem; margin: 4px 0; }

/* — Glossary ————————————————————————— */
.glossary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
@media (max-width: 720px) { .glossary-grid { grid-template-columns: 1fr; } }
.glossary-card { padding: 20px; }
.glossary-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.glossary-head h3 { font-size: 1.25rem; color: var(--primary); }
.glossary-card p { font-size: 0.92rem; margin: 0; }
.empty { text-align: center; color: var(--ink-muted); padding: 32px; }

/* — Quiz ————————————————————————— */
.quiz-meta { margin-bottom: 24px; display: flex; flex-direction: column; gap: 12px; }
.quiz-score {
  font-family: var(--font-mono); font-size: 0.88rem;
  padding: 10px 14px; border-radius: var(--r-sm);
  background: var(--surface);
  border: 1px solid var(--rule);
}
.quiz-score.good { background: var(--tag-tournant-bg); color: var(--tag-tournant-fg); border-color: var(--tag-tournant-fg); }
.quiz-list { display: flex; flex-direction: column; gap: 14px; max-width: 760px; margin: 0 auto; }
.quiz-card { padding: 22px; }
.quiz-num { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.16em; color: var(--accent); margin-bottom: 8px; }
.quiz-card h3 { font-size: 1.2rem; margin-bottom: 14px; }
.quiz-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media (max-width: 720px) { .quiz-options { grid-template-columns: 1fr; } }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: var(--r-sm);
  text-align: left;
  font-size: 0.92rem;
  transition: background .15s, border-color .15s;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: var(--surface); }
.quiz-opt.is-picked { border-color: var(--primary); background: var(--surface); }
.quiz-opt.is-right { border-color: var(--tag-tournant-fg); background: var(--tag-tournant-bg); color: var(--tag-tournant-fg); }
.quiz-opt.is-wrong { border-color: var(--tag-bataille-fg); background: var(--tag-bataille-bg); color: var(--tag-bataille-fg); }
.quiz-opt-letter {
  display: grid; place-items: center;
  width: 22px; height: 22px;
  border-radius: 999px;
  border: 1px solid var(--rule);
  font-family: var(--font-mono); font-size: 0.72rem;
}
.quiz-explain {
  margin-top: 12px;
  padding: 10px 12px;
  font-size: 0.85rem;
  border-radius: var(--r-sm);
  background: var(--bg-2);
}
.quiz-explain.good { background: var(--tag-tournant-bg); color: var(--tag-tournant-fg); }
.quiz-explain.bad { background: var(--tag-bataille-bg); color: var(--tag-bataille-fg); }
.quiz-actions { display: flex; justify-content: center; margin-top: 20px; }

/* — Flashcards ————————————————————————— */
.flashcard-stage { display: flex; justify-content: center; padding: 32px 0; perspective: 1400px; }
.flashcard {
  width: 100%; max-width: 540px;
  aspect-ratio: 5 / 3;
  position: relative;
  background: transparent;
  cursor: pointer;
  border-radius: var(--r-lg);
  overflow: hidden;
}
@media (max-width: 480px) { .flashcard { aspect-ratio: 4 / 3; } }
@media (max-width: 480px) { .flashcard-stage { padding: 20px 0; } }
@media (max-width: 480px) { .flashcard-controls { gap: 12px; flex-wrap: wrap; justify-content: center; } }
.flashcard-bg { position: absolute; inset: 0; color: var(--primary); pointer-events: none; z-index: 0; }
.flashcard-inner {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
}
.flashcard.is-flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  display: grid; place-items: center;
  border-radius: var(--r-lg);
  padding: 32px;
  background: var(--surface);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-2);
  text-align: center;
}
.flashcard-face::before {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: calc(var(--r-lg) - 6px);
  border: 1px solid color-mix(in oklab, var(--accent) 40%, transparent);
  pointer-events: none;
}
.flashcard-back { transform: rotateY(180deg); background: var(--bg-2); border-color: var(--accent); }
.flashcard-corner { position: absolute; top: 14px; left: 18px; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.14em; color: var(--ink-muted); text-transform: uppercase; }
.flashcard-text { font-family: var(--font-display); font-size: clamp(1.6rem, 4vw, 2.6rem); color: var(--primary); line-height: 1.2; }
.flashcard-text-back { font-family: var(--font-body); font-size: clamp(1rem, 2vw, 1.15rem); color: var(--ink); font-weight: 400; line-height: 1.5; }
.flashcard-hint { position: absolute; bottom: 14px; font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; }
.flashcard-controls { display: flex; justify-content: center; align-items: center; gap: 24px; }
.flashcard-progress { font-family: var(--font-mono); font-size: 0.85rem; color: var(--ink-muted); letter-spacing: 0.04em; }

/* — Timeline ————————————————————————— */
.timeline { position: relative; padding: 32px 0; max-width: 880px; margin: 0 auto; }
@media (max-width: 480px) { .timeline { padding: 16px 0; } .timeline-card { padding: 14px 18px; } }
.timeline-axis {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--accent) 5%, var(--accent) 95%, transparent);
  transform: translateX(-1px);
}
@media (max-width: 720px) { .timeline-axis { left: 18px; } }
.timeline-item { position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
.timeline-item.left .timeline-card { grid-column: 1; text-align: right; }
.timeline-item.right .timeline-card { grid-column: 2; }
.timeline-dot {
  position: absolute; left: 50%; top: 22px;
  width: 22px; height: 22px;
  border-radius: 0;
  background: var(--bg);
  border: 2px solid var(--accent);
  transform: translateX(-50%) rotate(45deg);
  display: grid; place-items: center;
  z-index: 2;
  box-shadow: 0 0 0 4px var(--bg), 0 0 0 5px color-mix(in oklab, var(--accent) 30%, transparent);
}
.timeline-dot-inner { width: 8px; height: 8px; background: var(--accent); transform: rotate(-45deg); }
@media (max-width: 720px) {
  .timeline-item, .timeline-item.left, .timeline-item.right { grid-template-columns: 1fr; }
  .timeline-item .timeline-card { grid-column: 1 !important; text-align: left !important; padding-left: 48px; }
  .timeline-dot { left: 18px; }
}
.timeline-card { padding: 18px 22px; }
.timeline-year { font-family: var(--font-display); font-size: 1.8rem; color: var(--primary); line-height: 1; margin-bottom: 4px; }
.timeline-card h3 { font-size: 1.15rem; margin-bottom: 6px; }
.timeline-place { font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-muted); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 8px; letter-spacing: 0.04em; }
.timeline-card p { font-size: 0.88rem; margin-bottom: 10px; }
.timeline-item.left .timeline-place { justify-content: flex-end; }

/* — Modal (search) ————————————————————————— */
.modal {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(31,26,20,.5);
  backdrop-filter: blur(4px);
  display: grid; place-items: flex-start center;
  padding: 12vh 16px 16px;
  animation: modalIn .15s ease;
}
@media (max-width: 480px) {
  .modal { padding: 0; align-items: flex-end; }
  .modal-card { border-radius: var(--r) var(--r) 0 0; display: flex; flex-direction: column; max-height: 82vh; }
  .modal-results { flex: 1; max-height: none; }
}
@keyframes modalIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: none; opacity: 1; } }
@media (max-width: 480px) { .modal-card { animation: slideUp .25s cubic-bezier(.2,0,.2,1); } }
.modal-card {
  width: min(620px, 100vw);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  box-shadow: var(--shadow-2);
  overflow: hidden;
  animation: modalCardIn .2s cubic-bezier(.2,0,.2,1);
}
@keyframes modalCardIn { from { transform: translateY(-8px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-search { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--rule); }
.modal-search input { flex: 1; background: transparent; border: none; outline: none; font-size: 1rem; color: var(--ink); }
.modal-empty { padding: 32px 24px; text-align: center; color: var(--ink-muted); font-size: 0.92rem; }
.modal-empty em { color: var(--accent); font-style: normal; font-family: var(--font-mono); font-size: 0.85rem; padding: 1px 6px; background: var(--bg-2); border-radius: 4px; }
.modal-results { max-height: 50vh; overflow-y: auto; }
.modal-result {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 12px;
  width: 100%;
  padding: 12px 18px;
  text-align: left;
  border-bottom: 1px solid var(--rule);
  transition: background .12s;
}
.modal-result:hover { background: var(--surface-2); }
.modal-result-type { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); align-self: center; }
.modal-result-title { font-weight: 600; font-size: 0.95rem; }
.modal-result-sub { grid-column: 2; font-size: 0.82rem; color: var(--ink-muted); }

/* ─── MOBILE TOUCH + BOTTOM NAV ──────────────────────── */
@media (max-width: 960px) {
  .nav-item { min-height: 44px; }
  .icon-btn { width: 44px; height: 44px; }
  .content { padding-bottom: 88px !important; }
  .foot { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }
}

.bottom-nav { display: none; }
@media (max-width: 960px) {
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 30;
    background: color-mix(in oklab, var(--surface) 94%, transparent);
    backdrop-filter: saturate(160%) blur(16px);
    -webkit-backdrop-filter: saturate(160%) blur(16px);
    border-top: 1px solid var(--rule);
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
    gap: 2px;
  }
  .bnav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 6px 4px;
    min-height: 52px;
    border-radius: var(--r-sm);
    color: var(--ink-muted);
    font-size: 0.58rem;

<script type="text/babel">
// ─── DATA ────────────────────────────────────────────────────────────────────
const CHAPTERS = [
  { id:"introduction", number:"I", title:"Introduction", kicker:"Notre enquête", summary:"Une question d'historien : comment étudier la vie de Mahomet en séparant les faits historiques des croyances religieuses ?", minutes:3 },

  { id:"evenements", number:"II.b", title:"Les événements majeurs", kicker:"Chronologie", summary:"De 570 à 632 : naissance, première révélation, persécutions, Hégire, batailles, prise pacifique de La Mecque, mort.", minutes:7 },

const EVENTS = [
  { year:"570", title:"Naissance de Mahomet", place:"La Mecque", body:"Mahomet est né vers 570 à La Mecque, dans le Hedjaz, d'après la Sira (sa biographie traditionnelle). Son père Abd Allah, du clan Hachim de la tribu des Quraychites, meurt avant sa naissance ; sa mère Amina meurt quand il a six ans.", tag:"naissance" },
  { year:"~595", title:"Mariage avec Khadija", place:"La Mecque", body:"Khadija, riche commerçante de sa tribu, l'embauche pour gérer ses caravanes. Impressionnée par son intégrité, elle lui propose de l'épouser. Il a 25 ans, elle en a 40. Ils restent mariés 25 ans jusqu'à la mort de Khadija.", tag:"vie-privée" },
  { year:"610", title:"Première révélation", place:"Mont Hira", body:"Mahomet devient prophète dès sa première vision sur le mont Hira, près de La Mecque. Selon la tradition musulmane, un ange identifié à Gabriel lui transmet la première des 114 révélations qui constitueront le Coran. Sa prédication commence : il dénonce les riches marchands et appelle à la justice envers les pauvres.", tag:"religion" },
  { year:"615", title:"Persécutions, exil vers l'Éthiopie", place:"La Mecque → Abyssinie", body:"Les fidèles deviennent nombreux, ce qui provoque une grande opposition. Entre 615 et 616, Mahomet conseille à ses partisans de se réfugier : sa lutte contre les idoles païennes bouleverse l'équilibre des clans. Une première vague part pour l'Éthiopie chrétienne.", tag:"opposition" },
  { year:"622", title:"L'Hégire", place:"La Mecque → Yathrib (Médine)", body:"Entre juillet et septembre 622, Mahomet et ses partisans quittent La Mecque pour Yathrib (l'ancienne Médine), où il a de la famille par sa grand-mère. Ce départ marque le début du calendrier musulman. À Médine, il s'allie avec les tribus arabes et juives — alliance vite rompue avec les juifs (prière vers La Mecque et non Jérusalem).", tag:"tournant" },
  { year:"624", title:"Bataille de Badr", place:"Près de Médine", body:"Mahomet est autorisé à utiliser la force pour récupérer les biens abandonnés et affaiblir le commerce mecquois. La bataille de Badr est sa première grande victoire : 72 morts et 50 prisonniers côté mecquois, contre 14 morts côté musulman.", tag:"bataille" },
  { year:"625", title:"Défaite de Uhud", place:"Près de Médine", body:"Entre 622 et 632, les historiens comptent 25 expéditions, environ 150 morts musulmans et 250 morts mecquois. Mahomet participe à 15 d'entre elles et sera blessé lors de la défaite de Uhud en 625.", tag:"bataille" },
  { year:"630", title:"Prise pacifique de La Mecque", place:"La Mecque", body:"En janvier 630, à la tête d'une armée de 10 000 hommes, Mahomet décide de reconquérir La Mecque. Il dit aux Mecquois : « Qu'est-ce que vous croyez que je vais faire de vous ? Partez, vous êtes libres. » Sans qu'une seule goutte de sang ne soit versée, la ville est reconquise et toutes les statues des anciens dieux sont brisées.", tag:"tournant" },
  { year:"632", title:"Mort de Mahomet", place:"Médine", body:"Lors du pèlerinage de 632, il fixe les règles du hadjdj (qui excluent les incroyants). À son retour, il tombe malade et meurt à Médine le 8 juin 632.", tag:"fin" },
];

const DIFFUSION = [
  { n:"01", title:"Le contexte social", body:"À La Mecque, la société est divisée en clans. Les Quraychites contrôlent l'argent, le commerce et même la religion. Les riches marchands deviennent de plus en plus riches, alors que les pauvres, veuves et orphelins sont laissés de côté. Quand Mahomet appelle à la justice et au partage, ce n'est pas qu'un message religieux : c'est un message social. Les pauvres y voient un espoir de vivre mieux." },
  { n:"02", title:"Le contexte religieux", body:"Avant l'islam, les Arabes sont polythéistes : ils croient en plusieurs dieux représentés par des statues dans la Kaaba. Mais le monothéisme n'est pas inconnu : à force de voyager pour le commerce, ils croisent des communautés juives dans les oasis et des marchands chrétiens venus de Syrie. Quand Mahomet arrive avec son message, les gens savent déjà ce que c'est qu'un Dieu unique. Sa religion propose d'unir toutes les tribus sous une seule idée." },
  { n:"03", title:"Les réseaux de commerce", body:"Comment une idée a-t-elle pu voyager aussi vite sans Internet ? Par le commerce. La Mecque est un carrefour où beaucoup de routes se croisent. Les caravanes ne transportent pas que des sacs de marchandises : elles transportent aussi des infos et des rumeurs. Dans les marchés des grandes villes, les gens racontent ce qu'ils ont entendu à La Mecque. Sans ce système de commerce très organisé, l'islam ne serait peut-être pas parti aussi loin." },
  { n:"04", title:"Le rôle des groupes de soutien", body:"Mahomet n'est pas resté seul. Au début, ce sont ses proches : Khadija, son ami Abou Bakr. À Médine (Hégire en 622), tout change : les tribus se disputent et ont besoin d'un chef pour ramener la paix. Mahomet est choisi pour ça. Il signe des pactes, montre qu'il est un vrai chef d'État. Plus il gagne des batailles ou réussit des traités, plus les autres tribus se disent qu'il est plus sûr d'être son allié." },
];

const GLOSSARY = [
  { term:"Polythéiste", def:"C'est quand on croit en plusieurs dieux en même temps. C'était le cas de la plupart des Arabes avant l'islam." },
  { term:"Monothéiste", def:"C'est quand on croit en un seul Dieu (comme dans l'islam, le christianisme ou le judaïsme)." },

  { term:"Coran", def:"C'est le livre sacré des musulmans. Il rassemble toutes les paroles que Mahomet a reçues, selon la tradition." },
  { term:"Caravane", def:"C'est un grand groupe de marchands qui voyagent ensemble avec des chameaux pour transporter des marchandises dans le désert." },

      <p>À cette époque, la région est un immense carrefour commercial. Il y a beaucoup d'échanges entre le Yémen, la Syrie et l'Abyssinie chrétienne (l'actuelle Éthiopie). La Mecque est une grande étape pour les caravanes. Autour de la ville, on trouve plein de tribus bédouines qui élèvent des chameaux pour transporter les marchandises.</p>

      <p>Comme son oncle n'a pas beaucoup d'argent, Mahomet doit travailler très jeune pour l'aider. Il commence comme berger, puis se lance dans le commerce. Dans sa tribu, il est très connu pour son honnêteté. Les gens le surnomment « Al Amine » (l'homme de confiance).</p>

const GlossaryPage = ({ query, fav, onFav, favorites, toggleFav }) => {
  const list = useMemo(()=>{
    const q=(query||"").trim().toLowerCase();
    if(!q) return GLOSSARY;
    return GLOSSARY.filter(g=>g.term.toLowerCase().includes(q)||g.def.toLowerCase().includes(q));
  },[query]);
  return (
    <div className="page page-prose">
      <ChapterHeader number="IV" kicker="Le petit lexique" title="Glossaire" sub={`${GLOSSARY.length} mots à connaître pour suivre l'enquête.`} fav={fav} onFav={onFav}/>

      <div className="glossary-grid">
        {list.map(g=>{
          const id=`glo-${g.term}`;
          const isFav=favorites.includes(id);
          return (
            <Card key={g.term} className="glossary-card">
              <div className="glossary-head">
                <h3>{g.term}</h3>
                <button className={`fav-btn ${isFav?"is-active":""}`} onClick={()=>toggleFav(id)} aria-label={`Favori : ${g.term}`}>
                  <Icon name={isFav?"starFill":"star"} size={14}/>
                </button>
              </div>
              <p>{g.def}</p>
            </Card>
          );
        })}
      </div>
    </div>
  );
};

const QuizPage = ({ onPass }) => {
  const [picks,setPicks] = useState({});
  const [submitted,setSubmitted] = useState(false);
  const score = useMemo(()=>QUIZ.reduce((s,q,i)=>(picks[i]===q.answer?s+1:s),0),[picks]);
  useEffect(()=>{if(submitted&&score>=8)onPass?.();},[submitted,score]);
  const answeredCount=Object.keys(picks).length;
  return (
    <div className="page page-prose">
      <ChapterHeader number="QZ" kicker="Vérifier ses connaissances" title="Quiz visuel" sub={`${QUIZ.length} questions pour tester tes connaissances.`}/>
      <div className="quiz-meta">
        <ProgressBar value={answeredCount} max={QUIZ.length} label="Questions répondues"/>
        {submitted&&<div className={`quiz-score ${score>=8?"good":""}`}>Score : <strong>{score}/{QUIZ.length}</strong>{score>=8?" — Œil de l'historien obtenu.":" — Encore un effort."}</div>}
      </div>
      <div className="quiz-list">
        {QUIZ.map((q,i)=>{
          const pick=picks[i];
          return (
            <Card key={i} className="quiz-card">
              <div className="quiz-num">Q{i+1}</div>
              <h3>{q.q}</h3>
              <div className="quiz-options">
                {q.options.map((o,j)=>{
                  const isPicked=pick===j, isRight=submitted&&j===q.answer, isWrong=submitted&&isPicked&&j!==q.answer;
                  return (
                    <button key={j} className={`quiz-opt ${isPicked?"is-picked":""} ${isRight?"is-right":""} ${isWrong?"is-wrong":""}`} disabled={submitted} onClick={()=>setPicks(p=>({...p,[i]:j}))}>
                      <span className="quiz-opt-letter">{String.fromCharCode(65+j)}</span><span>{o}</span>
                    </button>
                  );
                })}
              </div>
              {submitted&&<div className={`quiz-explain ${pick===q.answer?"good":"bad"}`}>{pick===q.answer?"Bonne réponse. ":"Mauvaise réponse. "}{q.explain}</div>}
            </Card>
          );
        })}
      </div>
      <div className="quiz-actions">
        {!submitted
          ?<Button icon="check" onClick={()=>setSubmitted(true)} disabled={answeredCount<QUIZ.length}>Valider mes réponses</Button>
          :<Button icon="rotate" variant="ghost" onClick={()=>{setPicks({});setSubmitted(false);}}>Recommencer</Button>}
      </div>
    </div>
  );
};

const FlashcardsPage = ({ onFlip3 }) => {
  const [idx,setIdx] = useState(0);
  const [flipped,setFlipped] = useState(false);
  const [seen,setSeen] = useState(new Set());
  const next=()=>{setFlipped(false);setIdx(i=>(i+1)%FLASHCARDS.length);};
  const prev=()=>{setFlipped(false);setIdx(i=>(i-1+FLASHCARDS.length)%FLASHCARDS.length);};
  const flip=()=>{
    setFlipped(f=>!f);
    setSeen(s=>{const ns=new Set(s);ns.add(idx);if(ns.size>=3)onFlip3?.();return ns;});
  };
  useEffect(()=>{
    const onKey=e=>{if(e.key==="ArrowRight")next();else if(e.key==="ArrowLeft")prev();else if(e.key===" "){e.preventDefault();flip();}};
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  });
  const card=FLASHCARDS[idx];
  return (
    <div className="page page-prose">
      <ChapterHeader number="FC" kicker="Cartes mémoire" title="Flashcards" sub={`${FLASHCARDS.length} cartes — cliquez pour retourner. Flèches ←/→, espace pour retourner.`}/>
      <div className="flashcard-stage">
        <button className={`flashcard ${flipped?"is-flipped":""}`} onClick={flip} aria-label="Retourner la carte">
          <div className="flashcard-bg"><StarPattern opacity={0.06} scale={0.75}/></div>
          <div className="flashcard-inner">
            <div className="flashcard-face flashcard-front">
              <div className="flashcard-corner">recto · {idx+1}/{FLASHCARDS.length}</div>
              <div className="flashcard-text">{card.front}</div>
              <div className="flashcard-hint">cliquer pour retourner</div>
            </div>
            <div className="flashcard-face flashcard-back">
              <div className="flashcard-corner">verso</div>
              <div className="flashcard-text flashcard-text-back">{card.back}</div>
            </div>
          </div>
        </button>
      </div>
      <div className="flashcard-controls">
        <Button variant="ghost" icon="arrow" onClick={prev}>Précédente</Button>
        <div className="flashcard-progress">{idx+1} / {FLASHCARDS.length}</div>
        <Button icon="arrow" onClick={next}>Suivante</Button>
      </div>
    </div>
  );
};

const TimelinePage = ({ onSeen }) => {
  useEffect(()=>{onSeen?.();},[]);
  return (
    <div className="page page-timeline">
      <ChapterHeader number="CR" kicker="9 jalons" title="Chronologie interactive" sub="De la naissance à la mort — survolez ou cliquez chaque date."/>
      <div className="timeline">
        <div className="timeline-axis"/>
        {EVENTS.map((e,i)=>(
          <div key={i} className={`timeline-item ${i%2===0?"left":"right"}`}>
            <div className="timeline-dot"><div className="timeline-dot-inner"/></div>
            <Card className="timeline-card">
              <div className="timeline-year">{e.year}</div>
              <h3>{e.title}</h3>
              <div className="timeline-place"><Icon name="map" size={13}/> {e.place}</div>
              <p>{e.body}</p>
              <Tag tone={e.tag}>{e.tag}</Tag>
            </Card>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── APP SHELL ────────────────────────────────────────────────────────────────
const PAGES = [
  {id:"accueil",label:"Accueil",icon:"home",group:""},
  {id:"introduction",label:"Introduction",icon:"scroll",group:"Cours"},
  {id:"temps-espace",label:"Temps & espace",icon:"map",group:"Cours"},
  {id:"evenements",label:"Événements majeurs",icon:"flag",group:"Cours"},
  {id:"diffusion",label:"Diffusion du message",icon:"spread",group:"Cours"},
  {id:"faits-vs-croyances",label:"Faits vs croyances",icon:"scale",group:"Cours"},
  {id:"conclusion",label:"Conclusion",icon:"check",group:"Cours"},
  {id:"chronologie",label:"Chronologie",icon:"timeline",group:"Outils"},
  {id:"flashcards",label:"Flashcards",icon:"card",group:"Outils"},
  {id:"quiz",label:"Quiz",icon:"quiz",group:"Outils"},
  {id:"glossaire",label:"Glossaire",icon:"book",group:"Outils"},
];

const STORAGE="histoire.v1";
const loadState=()=>{try{return JSON.parse(localStorage.getItem(STORAGE)||"{}");}catch(_){return{};}};
const saveState=s=>{try{localStorage.setItem(STORAGE,JSON.stringify(s));}catch(_){}};

const SEARCH_INDEX=[
  ...PAGES.filter(p=>p.id!=="accueil").map(p=>({type:"Page",title:p.label,target:p.id,sub:p.group})),
  ...CHAPTERS.map(c=>({type:"Chapitre",title:c.title,target:c.id,sub:c.summary})),
  ...EVENTS.map(e=>({type:"Date",title:`${e.year} — ${e.title}`,target:"chronologie",sub:e.body.slice(0,90)+"…"})),
  ...GLOSSARY.map(g=>({type:"Lexique",title:g.term,target:"glossaire",sub:g.def.slice(0,90)+"…"})),
];

const App = () => {
  const persisted=loadState();
  const [route,setRoute]=useState(persisted.route||"accueil");
  const [dark,setDark]=useState(persisted.dark||false);
  const [favorites,setFavorites]=useState(persisted.favorites||[]);
  const [earned,setEarned]=useState(persisted.earned||["first-step"]);
  const [sideOpen,setSideOpen]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [query,setQuery]=useState("");
  const [glossaryQuery,setGlossaryQuery]=useState("");

  useEffect(()=>{saveState({route,dark,favorites,earned});},[route,dark,favorites,earned]);
  useEffect(()=>{document.documentElement.dataset.theme=dark?"dark":"light";},[dark]);
  useEffect(()=>{setSideOpen(false);window.scrollTo({top:0});},[route]);

  const earnBadge=useCallback(id=>{setEarned(e=>e.includes(id)?e:[...e,id]);},[]);
  useEffect(()=>{
    if(route==="introduction")earnBadge("intro-read");
    if(route==="chronologie")earnBadge("timeline");
  },[route,earnBadge]);

  const toggleFav=useCallback(id=>{
    setFavorites(f=>{
      const next=f.includes(id)?f.filter(x=>x!==id):[...f,id];
      if(!f.includes(id))earnBadge("favorite");
      return next;
    });
  },[earnBadge]);

  const visitedKey="histoire.visited";
  const [visited,setVisited]=useState(()=>{try{return JSON.parse(localStorage.getItem(visitedKey)||"[]");}catch(_){return[];}});
  useEffect(()=>{
    if(!visited.includes(route)){
      const next=[...visited,route];
      setVisited(next);
      try{localStorage.setItem(visitedKey,JSON.stringify(next));}catch(_){}
    }
  },[route]);
  const progress=Math.min(100,Math.round(visited.length/PAGES.length*100));
  const badges=BADGES.map(b=>({...b,earned:earned.includes(b.id)}));

  const results=useMemo(()=>{
    const q=query.trim().toLowerCase();
    if(!q)return[];
    return SEARCH_INDEX.filter(it=>(it.title+" "+(it.sub||"")).toLowerCase().includes(q)).slice(0,10);
  },[query]);

  const go=id=>setRoute(id);
  const isFav=key=>favorites.includes(key);
  const fav=key=>()=>toggleFav(key);

  const navGroups=useMemo(()=>{
    const g={};
    PAGES.forEach(p=>{const k=p.group||"_";if(!g[k])g[k]=[];g[k].push(p);});
    return g;
  },[]);

  let body;
  switch(route){
    case "introduction":      body=<IntroductionPage fav={isFav("ch-introduction")} onFav={fav("ch-introduction")}/>;break;
    case "temps-espace":      body=<TempsEspacePage fav={isFav("ch-temps-espace")} onFav={fav("ch-temps-espace")}/>;break;
    case "evenements":        body=<EventsPage fav={isFav("ch-evenements")} onFav={fav("ch-evenements")}/>;break;
    case "diffusion":         body=<DiffusionPage fav={isFav("ch-diffusion")} onFav={fav("ch-diffusion")}/>;break;
    case "faits-vs-croyances":body=<FactsPage fav={isFav("ch-faits")} onFav={fav("ch-faits")}/>;break;
    case "conclusion":        body=<ConclusionPage fav={isFav("ch-conclusion")} onFav={fav("ch-conclusion")}/>;break;
    case "glossaire":         body=<GlossaryPage query={glossaryQuery} fav={isFav("ch-glossaire")} onFav={fav("ch-glossaire")} favorites={favorites} toggleFav={toggleFav}/>;break;
    case "quiz":              body=<QuizPage onPass={()=>earnBadge("quiz-pass")}/>;break;
    case "flashcards":        body=<FlashcardsPage onFlip3={()=>earnBadge("flashcards-3")}/>;break;
    case "chronologie":       body=<TimelinePage onSeen={()=>earnBadge("timeline")}/>;break;
    default:                  body=<HomePage go={go} progress={progress} favorites={favorites} badges={badges}/>;
  }

  return (
    <div className="app">
      <aside className={`sidebar ${sideOpen?"is-open":""}`}>
        <div className="brand" onClick={()=>go("accueil")}>
          <div className="brand-mark" aria-hidden="true"><RosetteMark size={22}/></div>
          <div><div className="brand-name">histoire</div><div className="brand-sub">cours interactif</div></div>
        </div>
        {Object.entries(navGroups).map(([g,items])=>(
          <div key={g} className="nav-group">
            {g!=="_"&&g!==""&&<div className="nav-group-title">{g}</div>}
            <ul>{items.map(p=>(
              <li key={p.id}>
                <button className={`nav-item ${route===p.id?"is-active":""}`} onClick={()=>go(p.id)}>
                  <Icon name={p.icon} size={16}/><span>{p.label}</span>
                </button>
              </li>
            ))}</ul>
          </div>
        ))}
        <div className="sidebar-foot">
          <div className="kicker">Progression</div>
          <ProgressBar value={progress}/>
          <div className="badges">
            {badges.map(b=>(
              <div key={b.id} className={`badge ${b.earned?"is-earned":""}`} title={`${b.label} — ${b.desc}`}>
                <Icon name={b.icon} size={13}/><span>{b.label}</span>
              </div>
            ))}
          </div>
        </div>
      </aside>

      {sideOpen&&<div className="overlay" onClick={()=>setSideOpen(false)}/>}

      <main className="main">
        <header className="topbar">
          <button className="icon-btn topbar-menu" onClick={()=>setSideOpen(o=>!o)} aria-label="Menu"><Icon name="menu" size={18}/></button>
          <div className="search">
            <button className="search-trigger" onClick={()=>setSearchOpen(true)} aria-label="Rechercher">
              <Icon name="search" size={16}/><span>Rechercher dans le cours…</span><kbd>/</kbd>
            </button>
          </div>
          <div className="topbar-right">
            <div className="topbar-progress"><ProgressBar value={progress}/></div>
            <button className="icon-btn" onClick={()=>setDark(d=>!d)} aria-label="Mode sombre"><Icon name={dark?"sun":"moon"} size={18}/></button>
          </div>
        </header>
        <div className="content">{body}</div>
        <footer className="foot">cours d'histoire mr nouichi · contenu : Ismael Miskin &amp; Ghali Filali, S2b</footer>
      </main>

      <nav className="bottom-nav" aria-label="Navigation principale">
        {[
          {id:"accueil",   label:"Accueil",  icon:"home"},
          {id:"evenements",label:"Dates",    icon:"timeline"},
          {id:"quiz",      label:"Quiz",     icon:"quiz"},
          {id:"flashcards",label:"Cartes",   icon:"card"},
          {id:"glossaire", label:"Lexique",  icon:"book"},
        ].map(p=>(
          <button key={p.id} className={`bnav-item ${route===p.id?"is-active":""}`} onClick={()=>go(p.id)} aria-label={p.label}>
            <Icon name={p.icon} size={22}/>
            <span>{p.label}</span>
          </button>
        ))}
      </nav>

      {searchOpen&&(
        <div className="modal" role="dialog" aria-modal="true" onClick={()=>setSearchOpen(false)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()}>
            <div className="modal-search">
              <Icon name="search" size={16}/>
              <input autoFocus type="text" placeholder="Mot-clé, date, terme…" value={query} onChange={e=>setQuery(e.target.value)}/>
              <button className="icon-btn" onClick={()=>setSearchOpen(false)}><Icon name="x" size={16}/></button>
            </div>
            {!query&&<div className="modal-empty">Essayez : <em>Hégire</em>, <em>624</em>, <em>Khadija</em>, <em>caravane</em>.</div>}
            {query&&results.length===0&&<div className="modal-empty">Aucun résultat.</div>}
            <div className="modal-results">
              {results.map((r,i)=>(
                <button key={i} className="modal-result" onClick={()=>{if(r.target==="glossaire")setGlossaryQuery(r.title);go(r.target);setSearchOpen(false);setQuery("");}}>
                  <span className="modal-result-type">{r.type}</span>
                  <span className="modal-result-title">{r.title}</span>
                  {r.sub&&<span className="modal-result-sub">{r.sub}</span>}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

window.addEventListener("keydown",e=>{
  if(e.key==="/"&&document.activeElement?.tagName!=="INPUT"){e.preventDefault();document.querySelector(".search-trigger")?.click();}
});

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
